                            <div class="search-input-group first">
                                <label>Where</label>
                                <input type="text" placeholder="Search destinations">
                            </div>
                            <div class="divider"></div>
                            <div class="search-input-group">
                                <label>Check in</label>
                                <span>Add dates</span>
                            </div>
                            <div class="divider"></div>
                            <div class="search-input-group">
                                <label>Check out</label>
                                <span>Add dates</span>
                            </div>
                            <div class="divider"></div>
                            <div class="search-input-group last">

                                    </svg>
                                    <span>Search</span>

                    <button class="scroll-btn prev" aria-label="Previous categories">
